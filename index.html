<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Integrador 1 - Dashboard CEUB</title>
    
    <!-- Tailwind CSS (Estilos) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Para compilar o JSX no navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Estilos da barra de rolagem */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #222222; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d926a9; }
        
        body { background-color: #000000; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- ÍCONES (Convertidos para SVG inline para não depender de pacotes externos) ---
        const Users = ({ size=24, className="" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>);
        const Briefcase = ({ size=24, className="" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>);
        const ShieldCheck = ({ size=24, className="" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.5 0 4.5 1 6.5 2a1 1 0 0 1 1 1v7z"/><path d="m9 12 2 2 4-4"/></svg>);
        const Search = ({ size=24, className="" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>);
        const Home = ({ size=24, className="" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>);
        const MessageSquare = ({ size=24, className="" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>);
        const TrendingUp = ({ size=24, className="" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>);
        const PieChart = ({ size=24, className="" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>);
        const AlertTriangle = ({ size=24, className="" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>);
        const CheckCircle2 = ({ size=24, className="" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>);


        // --- COMPONENTES VISUAIS ---

        const GradientCard = ({ title, value, subtitle, gradient }) => (
          <div className={`p-6 rounded-2xl shadow-lg text-white flex flex-col justify-center relative overflow-hidden ${gradient} h-full`}>
            <div className="absolute -right-6 -top-6 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl"></div>
            <p className="text-sm font-medium opacity-90 mb-1">{title}</p>
            <h3 className="text-4xl font-bold mb-1 flex items-baseline">
              {value} <span className="text-sm ml-2 opacity-80 font-normal">{subtitle}</span>
            </h3>
          </div>
        );

        const StatPill = ({ icon: Icon, label, value, trendColor }) => (
          <div className="bg-[#111111] p-4 rounded-xl flex items-center justify-between border border-[#222222]">
            <div className="flex items-center space-x-3">
              <div className={`p-2 rounded-full bg-[#000000]`}>
                <Icon size={16} className={trendColor} />
              </div>
              <span className="text-sm text-slate-300">{label}</span>
            </div>
            <div className={`text-xs px-2 py-1 rounded-md bg-[#000000] font-semibold ${trendColor} border border-[#222222]`}>
              {value}
            </div>
          </div>
        );

        const ProgressBarDark = ({ label, percentage, color = "bg-[#7c3aed]" }) => (
          <div className="mb-5">
            <div className="flex justify-between mb-2">
              <span className="text-sm font-medium text-slate-300">{label}</span>
              <span className="text-sm font-bold text-white">{percentage}%</span>
            </div>
            <div className="w-full bg-[#000000] rounded-full h-2.5 border border-[#222222]">
              <div className={`${color} h-2.5 rounded-full relative overflow-hidden`} style={{ width: `${percentage}%` }}>
                <div className="absolute inset-0 bg-white opacity-20 w-full h-full transform -skew-x-12"></div>
              </div>
            </div>
          </div>
        );

        const MainLineChart = () => (
          <div className="bg-[#111111] p-6 rounded-2xl border border-[#222222] h-full flex flex-col relative overflow-hidden">
            <div className="flex justify-between items-center mb-6">
              <h3 className="text-sm font-semibold text-white">Procura (Clientes) vs Oferta (Diaristas)</h3>
              <div className="flex space-x-4 text-xs">
                <span className="flex items-center text-slate-400"><span className="w-2 h-2 rounded-full bg-[#7c3aed] mr-2"></span> Oferta Ociosa</span>
                <span className="flex items-center text-slate-400"><span className="w-2 h-2 rounded-full bg-[#d926a9] mr-2"></span> Procura Reprimida</span>
              </div>
            </div>
            
            <div className="flex-1 w-full h-48 relative">
              <svg viewBox="0 0 500 150" className="w-full h-full overflow-visible" preserveAspectRatio="none">
                <defs>
                  <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feMerge>
                      <feMergeNode in="blur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                  <filter id="glowMagenta" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feMerge>
                      <feMergeNode in="blur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                </defs>
                
                {[0, 30, 60, 90, 120].map(y => (
                  <line key={y} x1="0" y1={y} x2="500" y2={y} stroke="#222222" strokeWidth="1" />
                ))}

                <path d="M0,100 C50,120 100,50 150,70 C200,90 250,110 300,50 C350,-10 400,80 450,60 C480,40 500,80 500,80" fill="none" stroke="#7c3aed" strokeWidth="3" filter="url(#glowPurple)" />
                <path d="M0,130 C60,90 120,130 180,90 C240,50 280,100 340,60 C400,20 440,110 500,70" fill="none" stroke="#d926a9" strokeWidth="3" strokeDasharray="5,5" filter="url(#glowMagenta)" />

                <circle cx="300" cy="50" r="5" fill="#7c3aed" className="animate-pulse" />
                <rect x="270" y="15" width="60" height="20" rx="4" fill="#d926a9" />
                <text x="300" y="29" fill="white" fontSize="10" textAnchor="middle" fontWeight="bold">Max - 78%</text>
              </svg>
            </div>
          </div>
        );

        const DonutChart = ({ title, percentage, colorPrimary, colorSecondary, label1, label2, strokeArray }) => (
          <div className="bg-[#111111] p-6 rounded-2xl border border-[#222222] flex flex-col items-center justify-center h-full">
            <h3 className="text-sm font-semibold text-white mb-4 w-full text-left">{title}</h3>
            <div className="relative w-32 h-32 flex-shrink-0">
              <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90">
                <circle cx="50" cy="50" r="40" fill="none" stroke={colorSecondary} strokeWidth="12" />
                <circle cx="50" cy="50" r="40" fill="none" stroke={colorPrimary} strokeWidth="12" strokeDasharray={strokeArray} strokeLinecap="round" className="drop-shadow-lg" />
              </svg>
              <div className="absolute inset-0 flex flex-col items-center justify-center">
                <span className="text-2xl font-bold text-white">{percentage}</span>
              </div>
            </div>
            <div className="mt-4 w-full space-y-2">
              <div className="flex items-center text-xs text-slate-400">
                <span className="w-3 h-3 rounded-full mr-2 shrink-0" style={{backgroundColor: colorPrimary}}></span> {label1}
              </div>
              <div className="flex items-center text-xs text-slate-400">
                <span className="w-3 h-3 rounded-full mr-2 shrink-0" style={{backgroundColor: colorSecondary}}></span> {label2}
              </div>
            </div>
          </div>
        );

        const GradientBarChart = () => (
          <div className="bg-[#111111] p-6 rounded-2xl border border-[#222222] h-full min-h-[250px] flex flex-col">
            <h3 className="text-sm font-semibold text-white mb-6 shrink-0">Meios de Contratação / Frequência</h3>
            <div className="flex-1 flex items-end justify-between px-2 space-x-2 relative h-full">
              <div className="absolute inset-0 flex flex-col justify-between z-0 pointer-events-none opacity-20 pb-6">
                <div className="border-b border-[#222222] w-full"></div>
                <div className="border-b border-[#222222] w-full"></div>
                <div className="border-b border-[#222222] w-full"></div>
                <div className="border-b border-[#222222] w-full"></div>
              </div>
              
              {[
                { day: 'Ind.', h: '85%' }, { day: 'Face', h: '45%' }, { day: 'Agên.', h: '25%' }, 
                { day: 'Apps', h: '10%' }, { day: 'Outros', h: '30%' }
              ].map((item, i) => (
                <div key={i} className="flex flex-col items-center justify-end z-10 w-full h-full">
                  <div className="w-full max-w-[32px] rounded-t-md bg-gradient-to-t from-[#7c3aed]/20 to-[#7c3aed] mb-2" style={{ height: item.h }}></div>
                  <span className="text-[10px] text-slate-400 shrink-0">{item.day}</span>
                </div>
              ))}
            </div>
          </div>
        );

        const WordCloudDark = () => (
          <div className="bg-[#111111] p-6 rounded-2xl border border-[#222222] h-full flex flex-col overflow-hidden">
            <h3 className="text-sm font-semibold text-white mb-4 shrink-0">Nuvem de Palavras: A Dor (Problema)</h3>
            <div className="flex-1 flex flex-wrap gap-x-3 gap-y-2 justify-center items-center content-center p-2">
              <span className="text-2xl lg:text-3xl text-[#d926a9] font-black drop-shadow-[0_0_8px_rgba(217,38,169,0.5)] text-center whitespace-nowrap">Confiança</span>
              <span className="text-xl lg:text-2xl text-[#7c3aed] font-bold text-center whitespace-nowrap">Desmarcação</span>
              <span className="text-lg lg:text-xl text-purple-400 font-semibold text-center whitespace-nowrap">Calote</span>
              <span className="text-base lg:text-lg text-slate-300 text-center whitespace-nowrap">Segurança</span>
              <span className="text-lg lg:text-xl text-violet-400 font-bold drop-shadow-[0_0_5px_rgba(124,58,237,0.4)] text-center whitespace-nowrap">Preço Injusto</span>
              <span className="text-sm lg:text-base text-slate-400 text-center whitespace-nowrap">Pessoas Estranhas</span>
              <span className="text-base lg:text-lg text-[#d926a9] font-semibold opacity-80 text-center whitespace-nowrap">Atraso</span>
              <span className="text-sm lg:text-base text-emerald-400 font-medium text-center whitespace-nowrap">Antecedentes</span>
            </div>
          </div>
        );

        // --- APLICAÇÃO PRINCIPAL ---

        function App() {
          const [activeTab, setActiveTab] = useState('geral');

          const navSections = [
            {
              title: "PERFIL DA PESQUISA",
              items: [
                { id: 'geral', label: 'Visão Geral (AED)', icon: TrendingUp },
                { id: 'diaristas', label: 'Dados: Diaristas', icon: Briefcase },
                { id: 'clientes', label: 'Dados: Clientes', icon: Home },
              ]
            },
            {
              title: "CANAIS E MÉTRICAS",
              items: [
                { id: 'ods', label: 'Métricas ODS 8', icon: ShieldCheck },
                { id: 'medos', label: 'Mapeamento de Dores', icon: MessageSquare },
              ]
            }
          ];

          const teamMembers = [
            "Lucas Balduino (PO)",
            "João Victor Rios",
            "Alexsander Motta",
            "Beatriz Espindola",
            "Vinicius Inoue"
          ];

          const activeItem = navSections.flatMap(s => s.items).find(i => i.id === activeTab) || navSections[0].items[0];

          return (
            <div className="min-h-screen bg-[#000000] flex font-sans text-slate-200 overflow-hidden selection:bg-[#d926a9] selection:text-white">
              
              {/* SIDEBAR */}
              <div className="w-64 bg-[#0a0a0a] border-r border-[#222222] flex flex-col z-20 shadow-2xl flex-shrink-0 h-screen overflow-y-auto">
                <div className="p-6">
                  <h1 className="text-xl font-bold flex items-center text-white mb-1">CEUB</h1>
                  <p className="text-[10px] text-slate-500 uppercase tracking-widest font-semibold">Projeto Integrador I</p>
                </div>
                
                <div className="flex-1 py-4">
                  {navSections.map((section, idx) => (
                    <div key={idx} className="mb-6">
                      <h4 className="px-6 text-[11px] font-bold text-slate-500 mb-3 tracking-wider flex items-center">
                        <span className="mr-2"><PieChart size={12}/></span> {section.title}
                      </h4>
                      <nav className="space-y-1">
                        {section.items.map((item) => {
                          const Icon = item.icon;
                          const isActive = activeTab === item.id;
                          return (
                            <button
                              key={item.id}
                              onClick={() => setActiveTab(item.id)}
                              className={`w-full flex items-center space-x-3 px-6 py-2.5 transition-all duration-200 text-sm ${
                                isActive 
                                  ? 'bg-gradient-to-r from-[#d926a9]/20 to-transparent border-l-4 border-[#d926a9] text-[#d926a9] font-medium' 
                                  : 'text-slate-400 hover:text-slate-200 hover:bg-[#111111] border-l-4 border-transparent'
                              }`}
                            >
                              <Icon size={18} className={isActive ? 'text-[#d926a9]' : 'text-slate-500'} />
                              <span>{item.label}</span>
                            </button>
                          );
                        })}
                      </nav>
                    </div>
                  ))}
                </div>

                <div className="p-6 border-t border-[#222222] bg-[#000000]/30">
                  <h4 className="text-[10px] font-bold text-slate-500 mb-4 tracking-wider flex items-center uppercase">
                    <Users size={14} className="mr-2" /> Equipe de Investigação
                  </h4>
                  <ul className="space-y-2.5">
                    {teamMembers.map((member, i) => (
                      <li key={i} className="text-xs text-slate-400 flex items-center hover:text-slate-200 transition-colors cursor-default">
                        <span className={`w-1.5 h-1.5 rounded-full mr-3 shrink-0 ${i === 0 ? 'bg-[#d926a9]' : 'bg-[#7c3aed]'}`}></span>
                        {member}
                      </li>
                    ))}
                  </ul>
                </div>
              </div>

              {/* MAIN CONTENT */}
              <div className="flex-1 flex flex-col h-screen overflow-hidden bg-[#000000]">
                <header className="px-8 py-6 flex justify-between items-center z-10 border-b border-[#111111]">
                  <div>
                    <h2 className="text-2xl font-bold text-white tracking-tight">{activeItem.label}</h2>
                    <p className="text-sm text-slate-400 mt-1">Validação analítica do projeto integrador de Limpeza Doméstica.</p>
                  </div>
                  <div className="flex items-center space-x-4">
                    <div className="hidden md:flex items-center space-x-2 bg-[#111111] px-4 py-2 rounded-full border border-[#222222]">
                      <Search size={14} className="text-slate-400" />
                      <span className="text-xs text-slate-400">Base: 100 Entrevistados</span>
                    </div>
                  </div>
                </header>

                <main className="flex-1 overflow-y-auto px-8 py-6 custom-scrollbar">
                  
                  {/* VISÃO GERAL */}
                  {activeTab === 'geral' && (
                    <>
                      <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-6">
                        <div className="lg:col-span-3">
                          <GradientCard title="Dificuldade de Contratação" value="78" subtitle="%" gradient="bg-gradient-to-br from-[#d926a9] to-[#8a2be2]"/>
                        </div>
                        <div className="lg:col-span-3">
                          <GradientCard title="Profissionais Ociosas" value="62" subtitle="%" gradient="bg-gradient-to-br from-[#7c3aed] to-[#4c1d95]"/>
                        </div>
                        <div className="lg:col-span-6 grid grid-cols-2 gap-4">
                           <StatPill icon={MessageSquare} label="Respostas Formulário" value="104" trendColor="text-[#7c3aed]" />
                           <StatPill icon={AlertTriangle} label="Taxa de Cancelamento" value="85%" trendColor="text-[#d926a9]" />
                           <StatPill icon={ShieldCheck} label="Foco de Atuação" value="ODS 8" trendColor="text-emerald-400" />
                           <StatPill icon={Users} label="Dependência Indicação" value="75%" trendColor="text-purple-400" />
                        </div>
                      </div>

                      <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-6">
                        <div className="lg:col-span-8 h-80"><MainLineChart /></div>
                        <div className="lg:col-span-4 h-80"><WordCloudDark /></div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <DonutChart title="Dificuldade Última Hora" percentage="78%" colorPrimary="#7c3aed" colorSecondary="#1a1a1a" label1="Difícil / Muito Difícil (78%)" label2="Neutro / Fácil (22%)" strokeArray="196 251"/>
                        <DonutChart title="ODS 8: Formalização (MEI)" percentage="82%" colorPrimary="#d926a9" colorSecondary="#2d0b26" label1="Alta Precarização (Sem MEI) (82%)" label2="Formalizadas (18%)" strokeArray="205 251"/>
                        <div className="h-64 md:h-full"><GradientBarChart /></div>
                      </div>
                    </>
                  )}

                  {/* DADOS: DIARISTAS */}
                  {activeTab === 'diaristas' && (
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                      <div className="bg-[#111111] p-6 rounded-2xl border border-[#222222]">
                        <h3 className="text-lg font-bold text-white mb-6 border-b border-[#222222] pb-3">Canais de Aquisição (Onde encontram trabalho?)</h3>
                        <ProgressBarDark label="Indicação de patroas/clientes atuais" percentage={75} color="bg-[#7c3aed]" />
                        <ProgressBarDark label="Grupos de Facebook/WhatsApp" percentage={45} color="bg-[#7c3aed]" />
                        <ProgressBarDark label="Agências de limpeza" percentage={15} color="bg-[#d926a9]" />
                        <ProgressBarDark label="Aplicações de telemóvel" percentage={8} color="bg-slate-500" />
                      </div>
                      <div className="flex flex-col gap-6">
                        <div className="h-40"><GradientCard title="Dias Livres Semanais (Ociosidade)" value="62" subtitle="% queriam estar a trabalhar" gradient="bg-gradient-to-br from-[#7c3aed] to-[#4c1d95]"/></div>
                        <div className="bg-[#111111] p-6 rounded-2xl border border-[#222222] flex-1">
                          <h3 className="text-sm font-bold text-white mb-4">Prejuízo Invisível</h3>
                          <div className="flex items-center p-4 bg-[#000000] rounded-xl border border-rose-900/50">
                             <AlertTriangle className="text-rose-500 mr-4 shrink-0" size={32} />
                             <p className="text-sm text-slate-300">
                               <strong className="text-white text-base block mb-1">71% ficam no prejuízo total</strong>
                               quando um cliente desmarca em cima da hora, não recebendo qualquer taxa e perdendo o dia de trabalho.
                             </p>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* DADOS: CLIENTES */}
                  {activeTab === 'clientes' && (
                     <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                     <div className="flex flex-col gap-6">
                       <div className="h-40"><GradientCard title="Frustração de Contratação (Última Hora)" value="78" subtitle="% consideram difícil/muito difícil" gradient="bg-gradient-to-br from-[#d926a9] to-[#8a2be2]"/></div>
                       <div className="bg-[#111111] p-6 rounded-2xl border border-[#222222] flex-1">
                         <h3 className="text-sm font-bold text-white mb-4">Comportamento de Procura</h3>
                         <div className="space-y-4">
                            <div className="flex items-center p-3 bg-[#000000] rounded-lg">
                              <CheckCircle2 className="text-[#7c3aed] mr-3" size={20} />
                              <span className="text-sm text-slate-300">Maioria procura serviços <strong className="text-white">Quinzenalmente</strong>.</span>
                            </div>
                            <div className="flex items-center p-3 bg-[#000000] rounded-lg">
                              <AlertTriangle className="text-amber-500 mr-3" size={20} />
                              <span className="text-sm text-slate-300">Ainda dependem <strong className="text-white">exclusivamente</strong> da indicação boca-a-boca.</span>
                            </div>
                         </div>
                       </div>
                     </div>
                     <div className="bg-[#111111] p-6 rounded-2xl border border-[#222222]">
                       <h3 className="text-lg font-bold text-white mb-6 border-b border-[#222222] pb-3">Critérios de Decisão (O que gera valor)</h3>
                       <ProgressBarDark label="Avaliações/Recomendações de outros" percentage={88} color="bg-[#d926a9]" />
                       <ProgressBarDark label="Verificação de antecedentes criminais" percentage={65} color="bg-[#d926a9]" />
                       <ProgressBarDark label="Preço cobrado" percentage={42} color="bg-[#7c3aed]" />
                       <ProgressBarDark label="Agilidade para conseguir alguém rápido" percentage={35} color="bg-slate-500" />
                       <p className="text-xs text-slate-400 mt-6 italic">* A Confiança supera amplamente o fator "Preço" na hora da contratação.</p>
                     </div>
                   </div>
                  )}

                  {/* DADOS: ODS 8 */}
                  {activeTab === 'ods' && (
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 min-h-[60vh]">
                       {/* Gráfico Customizado Maior à Esquerda */}
                       <div className="lg:col-span-5 flex flex-col">
                         <div className="bg-[#111111] p-8 rounded-2xl border border-[#222222] flex flex-col items-center justify-center h-full">
                           <h3 className="text-lg font-bold text-white mb-8 w-full text-center">Taxa de Formalização (MEI)</h3>
                           
                           <div className="relative w-56 h-56 lg:w-64 lg:h-64 flex-shrink-0 mb-8">
                             <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90">
                               <circle cx="50" cy="50" r="40" fill="none" stroke="#2d0b26" strokeWidth="10" />
                               <circle cx="50" cy="50" r="40" fill="none" stroke="#d926a9" strokeWidth="10" strokeDasharray="205 251" strokeLinecap="round" className="drop-shadow-[0_0_15px_rgba(217,38,169,0.4)]" />
                             </svg>
                             <div className="absolute inset-0 flex flex-col items-center justify-center">
                               <span className="text-5xl font-black text-white">82%</span>
                               <span className="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">Informalidade</span>
                             </div>
                           </div>
                           
                           <div className="w-full space-y-4 bg-[#000000] p-5 rounded-xl border border-[#222222]">
                             <div className="flex items-start text-sm text-slate-300">
                               <span className="w-3 h-3 rounded-full mr-3 shrink-0 bg-[#d926a9] shadow-[0_0_8px_rgba(217,38,169,0.6)] mt-1"></span>
                               <span><strong className="text-white">82%</strong> Alta Precarização (Sem MEI / Inadimplentes)</span>
                             </div>
                             <div className="flex items-start text-sm text-slate-300">
                               <span className="w-3 h-3 rounded-full mr-3 shrink-0 bg-[#2d0b26] mt-1"></span>
                               <span><strong className="text-white">18%</strong> Formalizadas (Pagamento em dia)</span>
                             </div>
                           </div>
                         </div>
                       </div>
                       
                       {/* Texto Explicativo à Direita */}
                       <div className="lg:col-span-7 bg-[#111111] p-8 lg:p-10 rounded-2xl border border-[#222222] flex flex-col justify-center">
                          <div className="w-16 h-16 bg-emerald-500/20 rounded-full flex items-center justify-center mb-8 border border-emerald-500/30">
                            <ShieldCheck className="text-emerald-400" size={32} />
                          </div>
                          <h3 className="text-2xl lg:text-3xl font-bold text-white mb-6">ODS 8: Trabalho Decente (ONU)</h3>
                          <p className="text-slate-300 text-lg leading-relaxed mb-8">
                            A ausência de formalização afasta as profissionais de limpeza dos seus direitos básicos de proteção social, como reforma, auxílio-doença e salário-maternidade.
                          </p>
                          <div className="bg-[#000000] p-6 rounded-xl border-l-4 border-[#d926a9]">
                            <p className="text-slate-400 text-sm leading-relaxed">
                              Os dados da pesquisa comprovam que <strong>82% do mercado local atua na informalidade total</strong> ou abriu o MEI mas deixou de pagar a guia (DAS) porque "o dinheiro da limpeza não chega". Esta métrica valida de forma irrefutável a urgência de uma solução tecnológica que incorpore sustentabilidade e segurança social.
                            </p>
                          </div>
                       </div>
                    </div>
                  )}

                  {/* DADOS: MAPA DE DORES */}
                  {activeTab === 'medos' && (
                     <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-[60vh]">
                       <WordCloudDark />
                       <div className="bg-[#111111] p-8 rounded-2xl border border-[#222222] flex flex-col justify-center overflow-y-auto">
                          <h3 className="text-xl font-bold text-white mb-6 border-b border-[#222222] pb-4">As Maiores Fricções do Mercado</h3>
                          <ul className="space-y-6">
                            <li className="flex items-start">
                              <div className="bg-[#7c3aed]/20 p-2 rounded-lg mr-4 shrink-0"><Home className="text-[#7c3aed]" size={20}/></div>
                              <div>
                                <strong className="text-white block mb-1">Contratantes (Clientes):</strong>
                                <span className="text-slate-400 text-sm">Medo de abrir a porta a pessoas estranhas sem verificação prévia ou antecedentes criminais. Insegurança quanto à qualidade do serviço.</span>
                              </div>
                            </li>
                            <li className="flex items-start">
                              <div className="bg-[#d926a9]/20 p-2 rounded-lg mr-4 shrink-0"><Briefcase className="text-[#d926a9]" size={20}/></div>
                              <div>
                                <strong className="text-white block mb-1">Profissionais (Diaristas):</strong>
                                <span className="text-slate-400 text-sm">Medo de assédio, insegurança no local de trabalho, calotes ou depararem-se com casas muito maiores do que o combinado previamente (Preço Injusto).</span>
                              </div>
                            </li>
                            <li className="flex items-start">
                              <div className="bg-amber-500/20 p-2 rounded-lg mr-4 shrink-0"><AlertTriangle className="text-amber-500" size={20}/></div>
                              <div>
                                <strong className="text-white block mb-1">O Problema Mútuo:</strong>
                                <span className="text-slate-400 text-sm">Desmarcações em cima da hora. O cliente fica sem a casa limpa e a profissional fica no prejuízo total no seu dia de trabalho.</span>
                              </div>
                            </li>
                          </ul>
                       </div>
                     </div>
                  )}

                </main>
              </div>
            </div>
          );
        }

        // Renderizar a aplicação
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
